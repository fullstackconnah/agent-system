services:

  orchestrator:
    image: ghcr.io/fullstackconnah/agent-orchestrator:latest
    container_name: agent-orchestrator
    restart: unless-stopped
    environment:
      - VAULT_PATH=/vault
      - PROJECTS_PATH=/projects
      - CLAUDE_CREDS=/root/.claude
      - HOST_VAULT_PATH=/home/connah/obsidian-vault
      - HOST_PROJECTS_PATH=/home/connah/projects
      - HOST_CLAUDE_CREDS=/home/connah/.claude
      - PORT=3000
    volumes:
      - /home/connah/obsidian-vault:/vault
      - /home/connah/projects:/projects
      - /home/connah/.claude:/root/.claude:ro
      - /home/connah/.gemini:/root/.gemini:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3001:3000"
    networks:
      - agent-net
      - npm-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - /home/connah/obsidian-vault:/vault
      - /home/connah/syncthing-config:/var/syncthing
    ports:
      - "8384:8384"
      - "22000:22000"
    networks:
      - agent-net

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_POLL_INTERVAL=300        # check every 5 minutes
      - WATCHTOWER_CLEANUP=true             # remove old images after update
      - WATCHTOWER_LABEL_ENABLE=true        # only update containers with the label
      - WATCHTOWER_INCLUDE_RESTARTING=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/connah/.docker/config.json:/config.json:ro  # ghcr.io auth
    networks:
      - agent-net

networks:
  agent-net:
    name: agent-net
  npm-net:
    external: true
    name: nginx-proxy-manager_default
