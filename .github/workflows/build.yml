name: Build & Push Images

on:
  push:
    branches: [main]
    paths:
      - 'orchestrator/**'
      - 'claude-agent/**'
      - 'nexus-api/**'
      - 'docker-compose.yml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-orchestrator:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push orchestrator
        uses: docker/build-push-action@v5
        with:
          context: ./orchestrator
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/agent-orchestrator:latest
          build-args: |
            DEPLOY_TITLE=${{ github.event.head_commit.message }}
            DEPLOY_SHA=${{ github.sha }}
          no-cache: true

  build-claude-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push claude-agent
        uses: docker/build-push-action@v5
        with:
          context: ./claude-agent
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/claude-agent:latest
          no-cache: true

  build-nexus-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nexus-api
        uses: docker/build-push-action@v5
        with:
          context: ./nexus-api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/nexus-api:latest
          no-cache: true

  deploy:
    needs: [build-orchestrator, build-claude-agent, build-nexus-api]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer redeploy
        run: |
          curl -X POST \
            "https://portainer.connah.com.au/api/stacks/webhooks/bca6ad50-58fc-4d1d-bc4b-08495636fe4d" \
            --fail \
            --silent \
            --show-error
